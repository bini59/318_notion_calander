name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  # 배포 서버가 arm64(Oracle Ampere)라 이미지도 arm64로 빌드해야 함 → GitHub-hosted(x64) 대신
  # self-hosted 러너에서 네이티브 빌드. QEMU 에뮬레이션 불필요.
  image:
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/bini59/318_notion_calander
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

  # self-hosted 러너가 이 배포 서버에 등록돼 있어야 함.
  # 고정 배포 경로 /home/ubuntu/03_personal/318_notion_calander 의 .env + named volume 을 사용한다
  # (Actions 워크스페이스가 아님). GHCR 이미지가 private일 수 있으니 pull 전 docker login 포함.
  deploy:
    runs-on: [self-hosted]
    needs: image
    steps:
      - name: Log in to GHCR
        run: docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and restart
        run: |
          cd /home/ubuntu/03_personal/318_notion_calander
          docker compose pull app
          docker compose up -d app
